<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base Chatbot</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(to bottom right, #0f172a, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 900px;
        }

        .header {
            background: #0f172a;
            border-bottom: 1px solid #334155;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #fff;
            font-size: 24px;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #94a3b8;
        }

        .sync-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #334155;
            background: #1e293b;
        }

        .tab-button {
            flex: 1;
            padding: 16px;
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }

        .tab-button.active {
            color: #fff;
            border-bottom-color: #3b82f6;
        }

        .tab-button:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* Chat Styles */
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: #3b82f6;
            color: white;
            border-radius: 12px 2px 12px 12px;
        }

        .message.bot {
            align-self: flex-start;
            background: #334155;
            color: #e2e8f0;
            border-radius: 2px 12px 12px 12px;
        }

        .input-area {
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }

        .input-area input::placeholder {
            color: #94a3b8;
        }

        .input-area input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .input-area button {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }

        .input-area button:hover {
            background: #2563eb;
        }

        /* KB Styles */
        .kb-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .search-area {
            display: flex;
            gap: 8px;
        }

        .search-area input {
            flex: 1;
            padding: 12px 16px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #fff;
        }

        .search-area button {
            padding: 12px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .add-btn {
            padding: 12px 16px;
            background: #334155;
            color: #94a3b8;
            border: 1px solid #475569;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
        }

        .add-btn:hover {
            background: #475569;
        }

        .qa-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .qa-item {
            background: #334155;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #475569;
            transition: all 0.3s;
        }

        .qa-item:hover {
            border-color: #64748b;
            background: #3f4655;
        }

        .qa-item h3 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .qa-item p {
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .qa-meta {
            font-size: 12px;
            color: #94a3b8;
        }

        .qa-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .qa-actions button {
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .delete-btn {
            background: #dc2626;
            color: white;
        }

        .delete-btn:hover {
            background: #b91c1c;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .form-group label {
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            padding: 8px 12px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #fff;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e293b;
            padding: 24px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .save-btn {
            background: #22c55e;
            color: white;
        }

        .save-btn:hover {
            background: #16a34a;
        }

        .cancel-btn {
            background: #475569;
            color: white;
        }

        .cancel-btn:hover {
            background: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Knowledge Base Chatbot</h1>
            <div class="sync-status">
                <div class="sync-indicator"></div>
                <span>Data Saved</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('chat')">💬 Chat</button>
            <button class="tab-button" onclick="switchTab('kb')">📚 Knowledge Base</button>
        </div>

        <div class="content">
            <!-- Chat Tab -->
            <div id="chat" class="tab-content active">
                <div class="chat-container">
                    <div class="messages" id="messages"></div>
                    <div class="input-area">
                        <input 
                            type="text" 
                            id="chatInput" 
                            placeholder="Type your question..." 
                            onkeypress="handleKeyPress(event)"
                        >
                        <button onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>

            <!-- KB Tab -->
            <div id="kb" class="tab-content">
                <div class="kb-container">
                    <div class="search-area">
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="Search knowledge base..." 
                            onkeypress="if(event.key==='Enter') searchKB()"
                        >
                        <button onclick="searchKB()">Search</button>
                    </div>
                    <button class="add-btn" onclick="openAddForm()">+ Add Q&A</button>
                    <div class="qa-list" id="qaList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">Add New Q&A</div>
            <div class="form-group">
                <label>Question</label>
                <input type="text" id="formQuestion" placeholder="Enter question...">
            </div>
            <div class="form-group">
                <label>Answer</label>
                <textarea id="formAnswer" placeholder="Enter answer..."></textarea>
            </div>
            <div class="form-group">
                <label>Category</label>
                <input type="text" id="formCategory" placeholder="e.g., General">
            </div>
            <div class="modal-buttons">
                <button class="save-btn" onclick="saveQA()">Save</button>
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize
        let knowledgeBase = [];
        let editingId = null;

        // Load data on startup
        window.addEventListener('DOMContentLoaded', function() {
            loadKnowledgeBase();
            addBotMessage('Hello! I\'m your AI assistant. Ask me anything or go to the Knowledge Base tab to add Q&A pairs.');
        });

        // Load from localStorage
        function loadKnowledgeBase() {
            const saved = localStorage.getItem('knowledgeBase');
            if (saved) {
                knowledgeBase = JSON.parse(saved);
            } else {
                knowledgeBase = [
                    {
                        id: 1,
                        question: "What are your business hours?",
                        answer: "We're open Monday to Friday, 9 AM to 6 PM. Weekends by appointment only.",
                        category: "General",
                        views: 45
                    },
                    {
                        id: 2,
                        question: "How do I reset my password?",
                        answer: "Click 'Forgot Password' on the login page, enter your email, and follow the instructions.",
                        category: "Account",
                        views: 120
                    }
                ];
                saveKnowledgeBase();
            }
        }

        // Save to localStorage
        function saveKnowledgeBase() {
            localStorage.setItem('knowledgeBase', JSON.stringify(knowledgeBase));
        }

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'kb') {
                displayQAList();
            }
        }

        // Chat functions
        function addBotMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const messageEl = document.createElement('div');
            messageEl.className = 'message bot';
            messageEl.textContent = text;
            messagesDiv.appendChild(messageEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addUserMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const messageEl = document.createElement('div');
            messageEl.className = 'message user';
            messageEl.textContent = text;
            messagesDiv.appendChild(messageEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;

            addUserMessage(message);
            input.value = '';

            // Find relevant Q&A
            const relevant = findRelevant(message);
            
            if (relevant.length > 0) {
                let response = `Based on our knowledge base:\n\n${relevant[0].question}\n${relevant[0].answer}`;
                addBotMessage(response);
                relevant[0].views++;
                saveKnowledgeBase();
            } else {
                addBotMessage('I don\'t have information about that. Try adding it to the Knowledge Base!');
            }
        }

        function findRelevant(query) {
            const q = query.toLowerCase();
            return knowledgeBase
                .filter(item => {
                    const question = item.question.toLowerCase();
                    const answer = item.answer.toLowerCase();
                    return question.includes(q) || answer.includes(q);
                })
                .sort((a, b) => b.views - a.views);
        }

        // KB functions
        function displayQAList() {
            const qaList = document.getElementById('qaList');
            qaList.innerHTML = '';

            knowledgeBase.forEach(qa => {
                const item = document.createElement('div');
                item.className = 'qa-item';
                item.innerHTML = `
                    <h3>${qa.question}</h3>
                    <p>${qa.answer}</p>
                    <div class="qa-meta">
                        <span>${qa.category}</span> • <span>${qa.views} views</span>
                    </div>
                    <div class="qa-actions">
                        <button class="delete-btn" onclick="deleteQA(${qa.id})">Delete</button>
                    </div>
                `;
                qaList.appendChild(item);
            });
        }

        function searchKB() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const qaList = document.getElementById('qaList');
            qaList.innerHTML = '';

            const results = knowledgeBase.filter(qa => 
                qa.question.toLowerCase().includes(query) || 
                qa.answer.toLowerCase().includes(query)
            );

            results.forEach(qa => {
                const item = document.createElement('div');
                item.className = 'qa-item';
                item.innerHTML = `
                    <h3>${qa.question}</h3>
                    <p>${qa.answer}</p>
                    <div class="qa-meta">
                        <span>${qa.category}</span> • <span>${qa.views} views</span>
                    </div>
                    <div class="qa-actions">
                        <button class="delete-btn" onclick="deleteQA(${qa.id})">Delete</button>
                    </div>
                `;
                qaList.appendChild(item);
            });
        }

        // Modal functions
        function openAddForm() {
            editingId = null;
            document.getElementById('formQuestion').value = '';
            document.getElementById('formAnswer').value = '';
            document.getElementById('formCategory').value = 'General';
            document.getElementById('modal').classList.add('active');
            document.querySelector('.modal-header').textContent = 'Add New Q&A';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function saveQA() {
            const question = document.getElementById('formQuestion').value.trim();
            const answer = document.getElementById('formAnswer').value.trim();
            const category = document.getElementById('formCategory').value.trim();

            if (!question || !answer || !category) {
                alert('Please fill in all fields');
                return;
            }

            const newQA = {
                id: Date.now(),
                question,
                answer,
                category,
                views: 0
            };

            knowledgeBase.push(newQA);
            saveKnowledgeBase();
            closeModal();
            displayQAList();
        }

        function deleteQA(id) {
            if (confirm('Delete this Q&A?')) {
                knowledgeBase = knowledgeBase.filter(qa => qa.id !== id);
                saveKnowledgeBase();
                displayQAList();
            }
        }
    </script>
</body>
</html>
