```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Knowledge Base Chatbot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:900px;
background:#1e293b;
border-radius:16px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
overflow:hidden;
display:flex;
flex-direction:column;
height:85vh;
}

.header{
background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
border-bottom:2px solid #3b82f6;
padding:20px;
color:white;
font-size:22px;
font-weight:700;
}

.tabs{
display:flex;
border-bottom:1px solid #334155;
}

.tab-button{
flex:1;
padding:16px;
background:none;
border:none;
color:#64748b;
cursor:pointer;
font-weight:500;
border-bottom:3px solid transparent;
}

.tab-button.active{
color:#3b82f6;
border-bottom-color:#3b82f6;
}

.content{
flex:1;
display:flex;
overflow:hidden;
}

.tab-content{
display:none;
flex:1;
overflow-y:auto;
padding:20px;
flex-direction:column;
}

.tab-content.active{
display:flex;
}

.messages{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;

}

.message{
padding:12px 16px;
border-radius:12px;
max-width:80%;
line-height:1.4;
}

.user{
align-self:flex-end;
background:#3b82f6;
color:white;
}

.bot{

}

.input-area{

color:white;

.search-area input{

border-radius:8px;
border:none;
background:#334155;

<body>

<div class="container">

<div class="header">
💬 Smart Knowledge Base Chatbot
</div>

<div class="tabs">
<button class="tab-button active">Chat</button>
<button class="tab-button">Knowledge Base</button>
</div>

<div class="content">

<div class="tab-content active">

<div id="messages" class="messages"></div>

<div class="input-area">
<input id="chatInput" placeholder="Ask something...">
<button id="sendBtn">Send</button>
</div>

</div>

<div class="tab-content">

<div class="search-area">
<input id="searchInput" placeholder="Search knowledge...">
</div>

<button class="add-btn" id="addBtn">+ Add Q&A</button>
<button class="add-btn" id="exportKB" style="background:#6366f1">Export Knowledge</button>
<button class="add-btn" id="importKB" style="background:#f59e0b">Import Knowledge</button>

<input type="file" id="importFile" hidden>

<div id="qaList" class="qa-list"></div>

</div>

</div>

</div>

<div id="modal" class="modal">

<div class="modal-content">

<h3 id="modalTitle">Add Q&A</h3>

<input id="formQuestion" placeholder="Question">

<textarea id="formAnswer" placeholder="Answer"></textarea>

<input id="formSynonyms" placeholder="Synonyms (comma separated)">

<input id="formCategory" placeholder="Category">

<div class="modal-buttons">
<button class="save-btn" id="saveBtn">Save</button>
<button class="cancel-btn" id="cancelBtn">Cancel</button>
</div>

</div>

</div>

<script>

let knowledgeBase=JSON.parse(localStorage.getItem("kb"))||[]
let editingIndex=null

const messages=document.getElementById("messages")
const chatInput=document.getElementById("chatInput")
const sendBtn=document.getElementById("sendBtn")

const qaList=document.getElementById("qaList")

const modal=document.getElementById("modal")
const modalTitle=document.getElementById("modalTitle")

const formQuestion=document.getElementById("formQuestion")
const formAnswer=document.getElementById("formAnswer")
const formSynonyms=document.getElementById("formSynonyms")
const formCategory=document.getElementById("formCategory")

function addMessage(text,type){

const msg=document.createElement("div")
msg.className="message "+type
msg.innerText=text

messages.appendChild(msg)
messages.scrollTop=messages.scrollHeight
}

function similarity(a,b){

a=a.toLowerCase()
b=b.toLowerCase()

let score=0

a.split(" ").forEach(w=>{
if(b.includes(w))score++
})

return score
}

function findAnswer(q){

let bestScore=0
let bestAnswer=null

knowledgeBase.forEach(item=>{

let score=similarity(q,item.question)

if(item.synonyms){

item.synonyms.split(",").forEach(s=>{
score+=similarity(q,s)
})

}

if(score>bestScore){

bestScore=score
bestAnswer=item.answer

}

})

return bestAnswer||"I couldn't find that in the knowledge base yet."
}

sendBtn.onclick=()=>{

const text=chatInput.value.trim()

if(!text)return

addMessage(text,"user")

setTimeout(()=>{
addMessage(findAnswer(text),"bot")
},300)

chatInput.value=""

}

function saveKB(){

localStorage.setItem("kb",JSON.stringify(knowledgeBase))
renderKB()

}

function renderKB(list=knowledgeBase){

qaList.innerHTML=""

list.forEach((item,index)=>{

const div=document.createElement("div")
div.className="qa-item"

div.innerHTML=`
<h3>${item.question}</h3>
<p>${item.answer}</p>
<div class="qa-meta">Category: ${item.category||"General"}</div>
<div class="qa-keywords">Synonyms: ${item.synonyms||"-"}</div>
<button class="edit-btn">Edit</button>
<button class="delete-btn">Delete</button>
`

div.querySelector(".edit-btn").onclick=()=>{

editingIndex=index

modalTitle.innerText="Edit Q&A"

formQuestion.value=item.question
formAnswer.value=item.answer
formSynonyms.value=item.synonyms||""
formCategory.value=item.category||""

modal.classList.add("active")

}

div.querySelector(".delete-btn").onclick=()=>{

if(confirm("Delete entry?")){

knowledgeBase.splice(index,1)
saveKB()

}

}

qaList.appendChild(div)

})

}

document.getElementById("addBtn").onclick=()=>{

editingIndex=null

modalTitle.innerText="Add Q&A"

formQuestion.value=""
formAnswer.value=""
formSynonyms.value=""
formCategory.value=""

modal.classList.add("active")

}

document.getElementById("cancelBtn").onclick=()=>modal.classList.remove("active")

document.getElementById("saveBtn").onclick=()=>{

const item={
question:formQuestion.value,
answer:formAnswer.value,
synonyms:formSynonyms.value,
category:formCategory.value
}

if(editingIndex!==null){
knowledgeBase[editingIndex]=item
}else{
knowledgeBase.push(item)
}

modal.classList.remove("active")
saveKB()

}

document.getElementById("searchInput").oninput=()=>{

const q=document.getElementById("searchInput").value.toLowerCase()

const results=knowledgeBase.filter(i=>
i.question.toLowerCase().includes(q)||
i.answer.toLowerCase().includes(q)||
(i.synonyms&&i.synonyms.toLowerCase().includes(q))
)

renderKB(results)

}

document.getElementById("exportKB").onclick=function(){

const data=JSON.stringify(knowledgeBase,null,2)

const blob=new Blob([data],{type:"application/json"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="knowledge-base.json"
a.click()

}

const importFile=document.getElementById("importFile")

document.getElementById("importKB").onclick=()=>importFile.click()

importFile.onchange=function(){

const reader=new FileReader()

reader.onload=function(){

knowledgeBase=JSON.parse(reader.result)
saveKB()

alert("Knowledge imported!")

}

reader.readAsText(this.files[0])

}

const tabs=document.querySelectorAll(".tab-button")
const contents=document.querySelectorAll(".tab-content")

tabs.forEach((tab,i)=>{

tab.onclick=()=>{

tabs.forEach(t=>t.classList.remove("active"))
contents.forEach(c=>c.classList.remove("active"))

tab.classList.add("active")
contents[i].classList.add("active")

}

})

renderKB()

addMessage("Hello! Ask me anything from the knowledge base 😊","bot")

</script>

</body>
</html>
