<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Knowledge Base Chatbot</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:900px;
height:85vh;
background:#1e293b;
border-radius:12px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
padding:20px;
background:#020617;
font-size:20px;
font-weight:bold;
}

.tabs{
display:flex;
}

.tab-button{
flex:1;
padding:15px;
background:#1e293b;
border:none;
color:#94a3b8;
cursor:pointer;
}

.tab-button.active{
color:#3b82f6;
border-bottom:3px solid #3b82f6;
}

.tab-content{
display:none;
flex:1;
padding:20px;
overflow:auto;
}

.tab-content.active{
display:flex;
flex-direction:column;
}

.messages{
flex:1;
overflow:auto;
}

.message{
padding:10px;
margin:6px 0;
border-radius:8px;
max-width:70%;
}

.user{
background:#2563eb;
align-self:flex-end;
}

.bot{
background:#334155;
}

.input-area{
display:flex;
gap:10px;
margin-top:10px;
}

input{
padding:10px;
border-radius:6px;
border:none;
flex:1;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.send-btn{
background:#3b82f6;
color:white;
}

.add-btn{
background:#22c55e;
color:white;
margin:5px 0;
}

.edit-btn{
background:#2563eb;
color:white;
margin-right:5px;
}

.delete-btn{
background:#dc2626;
color:white;
}

.qa-item{
background:#334155;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modal.active{
display:flex;
}

.modal-content{
background:#1e293b;
padding:20px;
width:400px;
border-radius:8px;
}

textarea{
width:100%;
height:80px;
}

</style>

</head>
<body>

<div class="container">

<div class="header">
Smart Knowledge Base Chatbot
</div>

<div class="tabs">
<button class="tab-button active">Chat</button>
<button class="tab-button">Knowledge Base</button>
</div>

<div id="chat" class="tab-content active">

<div id="messages" class="messages"></div>

<div class="input-area">
<input id="chatInput" placeholder="Ask something...">
<button class="send-btn" id="sendBtn">Send</button>
</div>

</div>

<div id="kb" class="tab-content">

<input id="searchInput" placeholder="Search knowledge...">

<button class="add-btn" id="addBtn">Add Q&A</button>
<button class="add-btn" id="exportKB">Export Knowledge</button>
<button class="add-btn" id="importKB">Import Knowledge</button>

<input type="file" id="importFile" hidden>

<div id="qaList"></div>

</div>

</div>


<div class="modal" id="modal">

<div class="modal-content">

<h3 id="modalTitle">Add Q&A</h3>

<input id="formQuestion" placeholder="Question">

<textarea id="formAnswer" placeholder="Answer"></textarea>

<input id="formSynonyms" placeholder="Synonyms (comma separated)">

<input id="formCategory" placeholder="Category">

<br><br>

<button id="saveBtn" class="add-btn">Save</button>
<button id="cancelBtn">Cancel</button>

</div>

</div>

<script>

/* STORAGE */

let knowledgeBase = JSON.parse(localStorage.getItem("kb")) || []
let editingIndex = null

/* DOM */

const messages=document.getElementById("messages")
const chatInput=document.getElementById("chatInput")
const sendBtn=document.getElementById("sendBtn")

const qaList=document.getElementById("qaList")

const addBtn=document.getElementById("addBtn")

const modal=document.getElementById("modal")
const modalTitle=document.getElementById("modalTitle")

const formQuestion=document.getElementById("formQuestion")
const formAnswer=document.getElementById("formAnswer")
const formSynonyms=document.getElementById("formSynonyms")
const formCategory=document.getElementById("formCategory")

const saveBtn=document.getElementById("saveBtn")
const cancelBtn=document.getElementById("cancelBtn")

const searchInput=document.getElementById("searchInput")

/* CHAT */

function addMessage(text,type){

const msg=document.createElement("div")
msg.className="message "+type
msg.innerText=text

messages.appendChild(msg)

messages.scrollTop=messages.scrollHeight
}

function similarity(a,b){

a=a.toLowerCase()
b=b.toLowerCase()

let score=0

a.split(" ").forEach(w=>{
if(b.includes(w))score++
})

return score
}

function findAnswer(question){

let bestScore=0
let bestAnswer=null

knowledgeBase.forEach(item=>{

let score=similarity(question,item.question)

if(item.synonyms){

item.synonyms.split(",").forEach(s=>{
score+=similarity(question,s)
})

}

if(score>bestScore){

bestScore=score
bestAnswer=item.answer

}

})

return bestAnswer || "I don't know that yet."
}

function sendMessage(){

const text=chatInput.value.trim()

if(!text)return

addMessage(text,"user")

setTimeout(()=>{
addMessage(findAnswer(text),"bot")
},300)

chatInput.value=""
}

sendBtn.onclick=sendMessage

chatInput.addEventListener("keypress",e=>{
if(e.key==="Enter")sendMessage()
})

/* KNOWLEDGE BASE */

function saveKB(){

localStorage.setItem("kb",JSON.stringify(knowledgeBase))
renderKB()
}

function renderKB(list=knowledgeBase){

qaList.innerHTML=""

list.forEach((item,index)=>{

const div=document.createElement("div")
div.className="qa-item"

div.innerHTML=`
<h3>${item.question}</h3>
<p>${item.answer}</p>
<small>${item.category||"General"}</small>
<br><br>
<button class="edit-btn">Edit</button>
<button class="delete-btn">Delete</button>
`

div.querySelector(".edit-btn").onclick=()=>{

editingIndex=index

modalTitle.innerText="Edit Q&A"

formQuestion.value=item.question
formAnswer.value=item.answer
formSynonyms.value=item.synonyms||""
formCategory.value=item.category||""

modal.classList.add("active")

}

div.querySelector(".delete-btn").onclick=()=>{

if(confirm("Delete entry?")){

knowledgeBase.splice(index,1)
saveKB()

}

}

qaList.appendChild(div)

})

}

/* ADD / EDIT */

addBtn.onclick=()=>{

editingIndex=null

modalTitle.innerText="Add Q&A"

formQuestion.value=""
formAnswer.value=""
formSynonyms.value=""
formCategory.value=""

modal.classList.add("active")

}

cancelBtn.onclick=()=>modal.classList.remove("active")

saveBtn.onclick=()=>{

const item={

question:formQuestion.value,
answer:formAnswer.value,
synonyms:formSynonyms.value,
category:formCategory.value

}

if(editingIndex!==null){

knowledgeBase[editingIndex]=item

}else{

knowledgeBase.push(item)

}

modal.classList.remove("active")

saveKB()

}

/* SEARCH */

searchInput.oninput=()=>{

const q=searchInput.value.toLowerCase()

const results=knowledgeBase.filter(i=>

i.question.toLowerCase().includes(q) ||
i.answer.toLowerCase().includes(q) ||
(i.synonyms && i.synonyms.toLowerCase().includes(q))

)

renderKB(results)

}

/* IMPORT EXPORT */

document.getElementById("exportKB").onclick=function(){

const data=JSON.stringify(knowledgeBase,null,2)

const blob=new Blob([data],{type:"application/json"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="knowledge-base.json"

a.click()

}

const importFile=document.getElementById("importFile")

document.getElementById("importKB").onclick=()=>importFile.click()

importFile.onchange=function(){

const reader=new FileReader()

reader.onload=function(){

knowledgeBase=JSON.parse(reader.result)

saveKB()

alert("Knowledge Imported")

}

reader.readAsText(this.files[0])

}

/* TABS */

const tabs=document.querySelectorAll(".tab-button")
const contents=document.querySelectorAll(".tab-content")

tabs.forEach((tab,i)=>{

tab.onclick=()=>{

tabs.forEach(t=>t.classList.remove("active"))
contents.forEach(c=>c.classList.remove("active"))

tab.classList.add("active")
contents[i].classList.add("active")

}

})

/* INIT */

renderKB()

addMessage("Hello! Ask me anything from the knowledge base.", "bot")

</script>

</body>
</html>
