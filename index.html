<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Knowledge Base Chatbot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.container{width:100%;max-width:900px;background:#1e293b;border-radius:16px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;display:flex;flex-direction:column;height:85vh;}
.header{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);border-bottom:2px solid #3b82f6;
padding:20px;color:white;font-size:22px;font-weight:700;}
.tabs{display:flex;border-bottom:1px solid #334155;}
.tab-button{flex:1;padding:16px;background:none;border:none;color:#64748b;cursor:pointer;font-weight:500;border-bottom:3px solid transparent;}
.tab-button.active{color:#3b82f6;border-bottom-color:#3b82f6;}
.content{flex:1;display:flex;overflow:hidden;}
.tab-content{display:none;flex:1;overflow-y:auto;padding:20px;flex-direction:column;}
.tab-content.active{display:flex;}
.messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:10px;}
.message{padding:12px 16px;border-radius:12px;max-width:80%;line-height:1.4;}
.user{align-self:flex-end;background:#3b82f6;color:white;border-radius:12px 4px 12px 12px;}
.bot{align-self:flex-start;background:#334155;color:#e2e8f0;border-radius:4px 12px 12px 12px;border-left:3px solid #3b82f6;}
.input-area{display:flex;gap:10px;}
.input-area input{flex:1;padding:12px;border-radius:8px;border:none;background:#334155;color:white;}
.input-area button{padding:12px 20px;background:#3b82f6;border:none;border-radius:8px;color:white;cursor:pointer;}
.search-area{display:flex;gap:10px;margin-bottom:10px;}
.search-area input{flex:1;padding:10px;border-radius:8px;border:none;background:#334155;color:white;}
.add-btn{padding:10px;border:none;border-radius:8px;background:#22c55e;color:white;cursor:pointer;margin-bottom:8px;}
.qa-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
.qa-item{background:linear-gradient(135deg,#334155 0%,#3f4655 100%);padding:18px;border-radius:12px;border:1px solid #475569;border-left:4px solid #3b82f6;transition:all .25s ease;}
.qa-item:hover{background:#475569;transform:translateX(4px);}
.qa-item h3{font-size:16px;margin-bottom:8px;color:white;}
.qa-item p{font-size:14px;color:#cbd5e1;margin-bottom:10px;}
.qa-meta{font-size:12px;color:#94a3b8;margin-bottom:6px;}
.qa-keywords{font-size:12px;color:#64748b;margin-bottom:10px;font-style:italic;}
.edit-btn{padding:6px 12px;background:#2563eb;border:none;border-radius:6px;color:white;cursor:pointer;margin-right:6px;}
.delete-btn{padding:6px 12px;background:#dc2626;border:none;border-radius:6px;color:white;cursor:pointer;}
.edit-btn:hover{background:#1d4ed8;}
.delete-btn:hover{background:#b91c1c;}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;}
.modal.active{display:flex;}
.modal-content{background:#1e293b;padding:20px;border-radius:10px;width:400px;}
.modal-content input,.modal-content textarea{width:100%;margin-bottom:10px;padding:10px;border:none;border-radius:6px;background:#334155;color:white;}
.modal-buttons{display:flex;gap:10px;}
.modal-buttons button{flex:1;padding:10px;border:none;border-radius:6px;cursor:pointer;}
.save-btn{background:#22c55e;color:white;}
.cancel-btn{background:#475569;color:white;}
</style>
</head>
<body>
<div class="container">
<div class="header">💬 Smart Knowledge Base Chatbot</div>
<div class="tabs">
<button class="tab-button active">Chat</button>
<button class="tab-button">Knowledge Base</button>
</div>
<div class="content">
<div class="tab-content active">
<div id="messages" class="messages"></div>
<div class="input-area">
<input id="chatInput" placeholder="Ask something...">
<button id="sendBtn">Send</button>
</div>
</div>
<div class="tab-content">
<div class="search-area">
<input id="searchInput" placeholder="Search knowledge...">
</div>
<button class="add-btn" id="addBtn">+ Add Q&A</button>
<button class="add-btn" id="exportKB" style="background:#6366f1">Export Knowledge</button>
<button class="add-btn" id="importKB" style="background:#f59e0b">Import Knowledge</button>
<input type="file" id="importFile" hidden>
<div id="qaList" class="qa-list"></div>
</div>
</div>
</div>
<div id="modal" class="modal">
<div class="modal-content">
<h3 id="modalTitle">Add Q&A</h3>
<input id="formQuestion" placeholder="Question">
<textarea id="formAnswer" placeholder="Answer"></textarea>
<input id="formSynonyms" placeholder="Synonyms (comma separated)">
<input id="formCategory" placeholder="Category">
<div class="modal-buttons">
<button class="save-btn" id="saveBtn">Save</button>
<button class="cancel-btn" id="cancelBtn">Cancel</button>
</div>
</div>
</div>

<script>
/* ===============================
   KNOWLEDGE BASE STORAGE
================================ */
let knowledgeBase = JSON.parse(localStorage.getItem("kb")) || [];
let editingIndex = null;

/* ===============================
   DOM ELEMENTS
================================ */
const messages = document.getElementById("messages");
const chatInput = document.getElementById("chatInput");
const sendBtn = document.querySelector(".input-area button");

const qaList = document.getElementById("qaList");
const addBtn = document.querySelector(".add-btn");

const modal = document.getElementById("modal");
const saveBtn = document.querySelector(".save-btn");
const cancelBtn = document.querySelector(".cancel-btn");

const formQuestion = document.getElementById("formQuestion");
const formAnswer = document.getElementById("formAnswer");
const formSynonyms = document.getElementById("formSynonyms");
const formCategory = document.getElementById("formCategory");

const searchInput = document.getElementById("searchInput");
const searchBtn = document.querySelector(".search-area button");

const tabs = document.querySelectorAll(".tab-button");
const contents = document.querySelectorAll(".tab-content");

/* ===============================
   UTILITIES
================================ */
function addMessage(text, type){
    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerText = text;
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
}

function similarity(a,b){
    a = a.toLowerCase();
    b = b.toLowerCase();
    let score = 0;
    a.split(" ").forEach(w => { if(b.includes(w)) score++; });
    return score;
}

function findAnswer(question){
    const q = question.toLowerCase();
    let bestScore = 0;
    let bestAnswer = null;
    knowledgeBase.forEach(item => {
        let score = similarity(q,item.question);
        if(item.synonyms){
            item.synonyms.split(",").forEach(s => score += similarity(q,s));
        }
        if(score > bestScore){
            bestScore = score;
            bestAnswer = item.answer;
        }
    });
    return bestAnswer && bestAnswer.trim() !== "" ? bestAnswer : "Sorry, I don't know the answer yet. Try adding it in the Knowledge Base 📚";
}

/* ===============================
   CHAT
================================ */
function sendMessage(){
    const text = chatInput.value.trim();
    if(!text) return;
    addMessage(text,"user");
    const answer = findAnswer(text);
    setTimeout(()=> addMessage(answer,"bot"),300);
    chatInput.value="";
}

if(sendBtn) sendBtn.onclick = sendMessage;
if(chatInput) chatInput.addEventListener("keypress", e => { if(e.key==="Enter") sendMessage(); });

/* ===============================
   RENDER KB
================================ */
function renderKB(list = knowledgeBase){
    if(!qaList) return;
    qaList.innerHTML = "";
    list.forEach((item,index)=>{
        const div = document.createElement("div");
        div.className = "qa-item";
        div.innerHTML = `
            <h3>${item.question}</h3>
            <p>${item.answer}</p>
            <div class="qa-meta">Category: ${item.category || "General"}</div>
            <div class="qa-keywords">Synonyms: ${item.synonyms || "-"}</div>
            <button class="edit-btn">Edit</button>
            <button class="delete-btn">Delete</button>
        `;
        // delete
        div.querySelector(".delete-btn")?.addEventListener("click",()=> {
            if(confirm("Delete this entry?")){
                knowledgeBase.splice(index,1);
                saveKB();
            }
        });
        // edit
        div.querySelector(".edit-btn")?.addEventListener("click",()=>{
            editingIndex = index;
            modal.classList.add("active");
            formQuestion.value = item.question;
            formAnswer.value = item.answer;
            formSynonyms.value = item.synonyms || "";
            formCategory.value = item.category || "";
        });
        qaList.appendChild(div);
    });
}

function saveKB(){
    localStorage.setItem("kb",JSON.stringify(knowledgeBase));
    renderKB();
}

/* ===============================
   ADD / EDIT Q&A
================================ */
addBtn?.addEventListener("click",()=>{
    editingIndex = null;
    modal.classList.add("active");
    formQuestion.value="";
    formAnswer.value="";
    formSynonyms.value="";
    formCategory.value="";
});

cancelBtn?.addEventListener("click",()=> modal.classList.remove("active"));

saveBtn?.addEventListener("click",()=>{
    const question = formQuestion.value.trim();
    const answer = formAnswer.value.trim();
    if(!question || !answer) return alert("Question and Answer required");
    const item = {question,answer,synonyms:formSynonyms.value,category:formCategory.value};
    if(editingIndex !== null){
        knowledgeBase[editingIndex] = item;
    }else{
        knowledgeBase.push(item);
    }
    modal.classList.remove("active");
    formQuestion.value="";
    formAnswer.value="";
    formSynonyms.value="";
    formCategory.value="";
    saveKB();
});

/* ===============================
   SEARCH
================================ */
function doSearch(){
    const q = searchInput?.value.toLowerCase() || "";
    const results = knowledgeBase.filter(item=>
        item.question.toLowerCase().includes(q) ||
        item.answer.toLowerCase().includes(q) ||
        (item.synonyms && item.synonyms.toLowerCase().includes(q))
    );
    renderKB(results);
}

if(searchBtn) searchBtn.addEventListener("click", doSearch);
if(searchInput) searchInput.addEventListener("input", doSearch);

/* ===============================
   TABS
================================ */
tabs.forEach((tab,i)=>{
    tab.addEventListener("click",()=>{
        tabs.forEach(t=>t.classList.remove("active"));
        contents.forEach(c=>c.classList.remove("active"));
        tab.classList.add("active");
        contents[i].classList.add("active");
    });
});

/* ===============================
   INIT
================================ */
renderKB();
addMessage("Hello! Ask me anything from the knowledge base 😊","bot");
</script>

</html>
