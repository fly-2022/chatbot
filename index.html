<script>
    // Switching between tabs (Chat and Knowledge Base)
    document.querySelectorAll('.tab-button').forEach(button => {
        button.addEventListener('click', () => {
            // Remove active class from all buttons
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            // Add active class to the clicked button
            button.classList.add('active');

            // Show the corresponding tab content
            const tabId = button.textContent.trim().toLowerCase();
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');
        });
    });

    // Handle sending a chat message
    const chatInput = document.getElementById('chatInput');
    const messagesContainer = document.getElementById('messages');
    const sendButton = document.querySelector('.input-area button');

    sendButton.addEventListener('click', () => {
        const userMessage = chatInput.value;
        if (userMessage) {
            // Add the user's message to the messages container
            const userMessageElement = document.createElement('div');
            userMessageElement.classList.add('message', 'user');
            userMessageElement.textContent = userMessage;
            messagesContainer.appendChild(userMessageElement);
            
            // Clear the input field
            chatInput.value = '';

            // Simulate a bot response
            const botMessageElement = document.createElement('div');
            botMessageElement.classList.add('message', 'bot');
            botMessageElement.textContent = "Bot's response to: " + userMessage;
            messagesContainer.appendChild(botMessageElement);
            
            // Scroll to the bottom of the messages container
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    });

    // Handle adding new Q&A
    const addBtn = document.querySelector('.add-btn');
    const modal = document.getElementById('modal');
    const cancelBtn = document.querySelector('.cancel-btn');
    const saveBtn = document.querySelector('.save-btn');

    addBtn.addEventListener('click', () => {
        modal.classList.add('active');
    });

    cancelBtn.addEventListener('click', () => {
        modal.classList.remove('active');
    });

    saveBtn.addEventListener('click', () => {
        const question = document.getElementById('formQuestion').value;
        const answer = document.getElementById('formAnswer').value;
        const synonyms = document.getElementById('formSynonyms').value;
        const category = document.getElementById('formCategory').value;

        if (question && answer) {
            const qaItem = document.createElement('div');
            qaItem.classList.add('qa-item');
            qaItem.innerHTML = `
                <h3>${question}</h3>
                <p>${answer}</p>
                <div class="qa-meta">Category: ${category}</div>
                <div class="qa-keywords">Synonyms: ${synonyms}</div>
                <button class="delete-btn">Delete</button>
            `;
            document.getElementById('qaList').appendChild(qaItem);

            // Clear form inputs
            document.getElementById('formQuestion').value = '';
            document.getElementById('formAnswer').value = '';
            document.getElementById('formSynonyms').value = '';
            document.getElementById('formCategory').value = '';

            modal.classList.remove('active');
        }
    });
</script>
